{{- if .Values.redis.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  labels: {{- include "fuzebox.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis, release: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app: redis, release: {{ .Release.Name }} }
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
spec:
  selector: { app: redis, release: {{ .Release.Name }} }
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
